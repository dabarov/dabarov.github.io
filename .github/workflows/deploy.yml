name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Minify CSS & JS
        run: |
          npm install --save-dev esbuild
          npx esbuild css/style.css --minify --outfile=css/style.css --allow-overwrite
          npx esbuild css/normalize.css --minify --outfile=css/normalize.css --allow-overwrite
          npx esbuild css/all.css --minify --outfile=css/all.css --allow-overwrite
          npx esbuild js/main.js --minify --outfile=js/main.js --allow-overwrite

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
